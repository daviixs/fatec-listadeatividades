spring.application.name=todolist

# Datasource (Render Postgres)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:${JDBC_DATABASE_URL}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
# Usa update para criar tabelas no primeiro deploy (depois pode voltar a validate)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Cache / Redis
spring.cache.type=${SPRING_CACHE_TYPE:redis}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=2s
spring.data.redis.repositories.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info,caches,metrics
management.endpoint.health.show-details=always

# Seed
app.seed.enabled=${APP_SEED_ENABLED:false}

# Cache TTLs
app.cache.salas-ttl=${APP_CACHE_SALAS_TTL:30m}
app.cache.materias-ttl=${APP_CACHE_MATERIAS_TTL:15m}
app.cache.calendario-ttl=${APP_CACHE_CALENDARIO_TTL:5m}

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Server port (Render injeta $PORT)
server.port=${PORT:8080}
