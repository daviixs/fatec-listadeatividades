spring.application.name=todolist

# Datasource (Render Postgres)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:${JDBC_DATABASE_URL}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Server port (Render injeta $PORT)
server.port=${PORT:8080}
