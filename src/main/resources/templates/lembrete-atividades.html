<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Resumo de atividades pendentes</title>
  <style>
    body { font-family: "Source Sans Pro", "Helvetica Neue", Arial, sans-serif; background:#f7f7f9; color:#1f2933; padding:32px; }
    .card { max-width: 720px; margin:0 auto; background:#ffffff; border:1px solid #e5e7eb; border-radius:16px; box-shadow:0 10px 30px rgba(15,23,42,0.06); overflow:hidden; }
    header { padding:24px 28px; background:linear-gradient(135deg,#0f172a,#1e293b); color:#f8fafc; }
    header h1 { margin:0; font-size:22px; letter-spacing:-0.01em; }
    header p { margin:4px 0 0; color:#cbd5e1; }
    .content { padding:28px; }
    .intro { margin:0 0 20px; line-height:1.6; }
    section.sala { border:1px solid #e5e7eb; border-radius:12px; padding:16px 18px; margin-bottom:14px; background:linear-gradient(180deg,#fff,#f9fafb); }
    section.sala h3 { margin:0 0 10px; font-size:17px; color:#0f172a; }
    section.sala ul { list-style:none; margin:0; padding:0; }
    section.sala li { display:flex; flex-direction:column; padding:10px 0; border-top:1px solid #e5e7eb; }
    section.sala li:first-child { border-top:none; }
    .materia { font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:#475569; font-weight:700; }
    .titulo { font-size:15px; font-weight:700; color:#0f172a; margin:4px 0; }
    .prazo { font-size:13px; color:#0ea5e9; font-weight:700; }
    footer { padding:20px 28px; background:#f8fafc; color:#475569; font-size:13px; text-align:center; }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <h1>Resumo de atividades pendentes</h1>
      <p>Organize seus próximos passos na sala.</p>
    </header>
    <div class="content">
      <p class="intro">Aqui estão as atividades ainda abertas nas salas que você acompanha. Verifique os prazos e conclua dentro do período.</p>
      {{SALAS}}
    </div>
    <footer>Mensagem automática – não responda este email.</footer>
  </div>
</body>
</html>
