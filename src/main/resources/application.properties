spring.application.name=seu-calendario-academico

# H2 Database (memória para desenvolvimento)
spring.datasource.url=jdbc:h2:mem:seu_calendario_academico;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (acessível em http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Cache / Redis
spring.cache.type=${SPRING_CACHE_TYPE:redis}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=2s
spring.data.redis.repositories.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info,caches,metrics
management.endpoint.health.show-details=always

# Seed
app.seed.enabled=${APP_SEED_ENABLED:true}

# Cache TTLs
app.cache.salas-ttl=30m
app.cache.materias-ttl=15m
app.cache.calendario-ttl=5m

# Scheduler 12h fixo: 09:00 e 21:00
app.lembrete.cron=0 0 9,21 * * ?
app.lembrete.zone=America/Sao_Paulo

# Resend (env vars)
resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:no-reply@seudominio.com}

# Admin secret (proteção simples)
app.admin.secret=${ADMIN_SECRET:}

# Master Admin (Super Admin global)
app.master-admin.username=${MASTER_ADMIN_USERNAME:davizin99}
app.master-admin.password=${MASTER_ADMIN_PASSWORD:davizin99}
