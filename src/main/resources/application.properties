spring.application.name=todolist

# Sempre incluir variáveis do .env (quando existir) em qualquer profile
# Isso evita que perfis como "prod" sobrescrevam o carregamento do .env local
spring.profiles.include=dotenv

# Perfil padrão para desenvolvimento
spring.profiles.active=dotenv

# H2 Database (memória para desenvolvimento)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# H2 Console (acessível em http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Scheduler 12h fixo: 09:00 e 21:00
app.lembrete.cron=0 0 9,21 * * ?
app.lembrete.zone=America/Sao_Paulo

# Resend (env vars)
resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:no-reply@seudominio.com}

# Admin secret (proteção simples)
app.admin.secret=${ADMIN_SECRET:}
